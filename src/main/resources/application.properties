spring.application.name=RutaDelSabor-Core

# --- CONEXIÓN A POSTGRESQL ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lrds_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:ansu22}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE & JPA ---
# MUY IMPORTANTE: "none" porque ya creamos la BD con scripts SQL CRISTIANO CHUPA PINGA.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- SEGURIDAD JWT ---
# En producción: export JWT_SECRET=<clave-base64-256-bits> antes de arrancar el servicio.
jwt.secret=${JWT_SECRET:Z2FicmllbGRpZWdvamVzdXNqaG9qYW5sZWFuZHJvcmljYXJkbzIyMjIyNzI1MTEwNTA2}
# Expiración estándar: 24 horas en milisegundos
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
# R1-3: cuenta kiosco de cocina (ROLE_COCINA) recibe token de larga duración — 30 días en milisegundos.
# Cambiar con JWT_EXPIRATION_MS_COCINA en producción según política de seguridad del tenant.
jwt.expiration-cocina=${JWT_EXPIRATION_MS_COCINA:2592000000}

# --- PUERTO DEL SERVIDOR ---
server.port=${SERVER_PORT:8080}
