spring.application.name=RutaDelSabor-Core

# --- CONEXIÓN A POSTGRESQL ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lrds_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE & JPA ---
# MUY IMPORTANTE: "none" porque ya creamos la BD con scripts SQL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- SEGURIDAD JWT ---
# En producción: export JWT_SECRET=<clave-base64-256-bits> antes de arrancar el servicio.
jwt.secret=${JWT_SECRET:Z2FicmllbGRpZWdvamVzdXNqaG9qYW5sZWFuZHJvcmljYXJkbzIyMjIyNzI1MTEwNTA2}
# Expiración: 24 horas en milisegundos (86400000)
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# --- PUERTO DEL SERVIDOR ---
server.port=${SERVER_PORT:8080}
